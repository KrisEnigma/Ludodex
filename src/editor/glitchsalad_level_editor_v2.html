
<h2 class="sr-only">GlitchSalad level editor v2 — type letters into grid tiles, draw word paths, validate and export puzzle JSON</h2>

<script>
const COLS=['a','b','c','d'],ROWS=['1','2','3','4'];
const CELL_ORDER=ROWS.flatMap(r=>COLS.map(c=>c+r));
const WC=['#4a90d9','#d94a6a','#48bb78','#ed8936','#9f7aea','#38b2ac','#f6ad55','#fc8181'];
const CATS=['characters','titles','studios','franchises','consoles','composers','genres','decades'];
const DIFFS=['easy','medium','hard'];

let pf=null;
let S={
  meta:{id:'',nameEn:'',nameEs:'',category:'characters',difficulty:'medium',date:'',premium:false,hintEn:'',hintEs:''},
  letters:{},words:[],drawIdx:null,path:[],newWord:'',
  showImport:false,importText:'',importErr:'',copied:false
};

// --- Task 3: localStorage autosave + restore ---
const AUTOSAVE_KEY='glitchsalad_editor_v2_state';

function saveState(){
  try{
    const persistable={meta:S.meta,letters:S.letters,words:S.words,newWord:S.newWord};
    localStorage.setItem(AUTOSAVE_KEY,JSON.stringify(persistable));
  }catch(e){}
}

function loadState(){
  try{
    const saved=localStorage.getItem(AUTOSAVE_KEY);
    if(!saved)return;
    const parsed=JSON.parse(saved);
    if(!parsed||typeof parsed!=='object')return;
    if(parsed.meta&&typeof parsed.meta==='object')S.meta={...S.meta,...parsed.meta};
    if(parsed.letters&&typeof parsed.letters==='object')S.letters=parsed.letters;
    if(Array.isArray(parsed.words))S.words=parsed.words.map(w=>({
      id:w.id||Math.random().toString(36).slice(2),
      display:String(w.display||''),
      path:String(w.path||''),
      color:String(w.color||WC[0])
    }));
    if(typeof parsed.newWord==='string')S.newWord=parsed.newWord;
  }catch(e){}
}

function isAdj(a,b){if(!a||!b||a===b)return false;return Math.abs(a.charCodeAt(0)-b.charCodeAt(0))<=1&&Math.abs(+a[1]-+b[1])<=1;}

function buildOwn(words){
  const o={};
  words.forEach((w,i)=>{(w.path.match(/.{2}/g)||[]).forEach(c=>{if(!o[c])o[c]=[];if(!o[c].includes(i))o[c].push(i);});});
  return o;
}

function validate(meta,words,letters){
  const er=[],wa=[];
  if(!meta.id)er.push('Missing ID');
  else if(!/^[a-z0-9]+$/.test(meta.id))er.push('ID must be lowercase alphanumeric');
  if(!meta.nameEn)er.push('Missing name (EN)');
  if(!words.length)er.push('No words added');
  const tileLetters={};
  words.forEach(w=>{
    if(!w.display.trim()){er.push('Empty word name');return;}
    const coords=w.path.match(/.{2}/g)||[];
    const exp=w.display.replace(/ /g,'').split('');
    if(!coords.length){er.push(`"${w.display}": no path drawn`);return;}
    if(coords.length!==exp.length)er.push(`"${w.display}": path ${coords.length} steps ≠ ${exp.length} letters`);
    for(let i=1;i<coords.length;i++)if(!isAdj(coords[i-1],coords[i])){er.push(`"${w.display}": ${coords[i-1]}→${coords[i]} not adjacent`);break;}
    coords.forEach((c,i)=>{
      if(!CELL_ORDER.includes(c)){er.push(`Out of bounds: ${c}`);return;}
      const gl=letters[c],el=exp[i];
      if(!gl)er.push(`"${w.display}": tile ${c} is empty`);
      else if(gl!==el)er.push(`"${w.display}" tile ${c}: grid="${gl}" expected="${el}"`);
      if(tileLetters[c]&&tileLetters[c]!==el)er.push(`Tile conflict at ${c}: "${tileLetters[c]}" vs "${el}"`);
      else tileLetters[c]=el;
    });
  });
  const filled=CELL_ORDER.filter(c=>letters[c]).length;
  if(words.length&&filled<16)wa.push(`${filled}/16 tiles filled`);
  return{errors:er,warnings:wa,valid:!er.length};
}

function toJSON(meta,words,letters){
  const pathTiles=new Set();
  words.forEach(w=>(w.path.match(/.{2}/g)||[]).forEach(c=>pathTiles.add(c)));
  const filler={};
  CELL_ORDER.forEach(c=>{if(letters[c]&&!pathTiles.has(c))filler[c]=letters[c];});
  const data={};
  words.forEach(w=>{if(w.display&&w.path)data[w.display]=w.path;});
  return JSON.stringify({
    id:meta.id,
    name:{en:meta.nameEn,...(meta.nameEs&&{es:meta.nameEs})},
    category:meta.category,difficulty:meta.difficulty,
    date:meta.date||null,series:null,premium:meta.premium,
    hint:(meta.hintEn||meta.hintEs)?{en:meta.hintEn,...(meta.hintEs&&{es:meta.hintEs})}:null,
    ...(Object.keys(filler).length&&{filler}),
    data
  },null,2);
}

function cell(coord){
  const{drawIdx,path,letters,words}=S;
  const own=buildOwn(words);
  const letter=letters[coord]||'';
  const inPath=path.includes(coord);
  const pos=path.indexOf(coord);
  const owners=own[coord]||[];
  const wD=drawIdx!==null?words[drawIdx]:null;
  const last=path[path.length-1];
  const maxLen=wD?wD.display.replace(/ /g,'').length:0;
  const canAdd=drawIdx!==null&&!inPath&&path.length<maxLen&&(path.length===0||isAdj(last,coord));
  let bg='var(--color-background-primary)',brd='0.5px solid var(--color-border-tertiary)',lc='var(--color-text-primary)';
  if(drawIdx!==null&&inPath){bg=wD.color+'28';brd=`2px solid ${wD.color}`;lc=wD.color;}
  else if(drawIdx!==null&&canAdd){brd=`1.5px dashed ${wD.color}88`;}
  else if(drawIdx===null&&owners.length>0){const wc=words[owners[0]]?.color;bg=wc+'20';brd=`1.5px solid ${wc}77`;lc=wc;}
  const inner=drawIdx!==null
    ?`<div onclick="cellClick('${coord}')" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;cursor:pointer;padding-bottom:12px;box-sizing:border-box;font-size:20px;font-weight:500;font-family:var(--font-mono);color:${lc}">${letter}</div>`
    :`<input id="t-${coord}" type="text" maxlength="1" value="${letter}" oninput="tIn('${coord}',this)" onkeydown="tKd('${coord}',event)" autocomplete="off" style="width:100%;height:100%;background:transparent;border:none;outline:none;text-align:center;font-size:20px;font-weight:500;font-family:var(--font-mono);color:${lc};padding:0 0 12px 0;box-sizing:border-box;text-transform:uppercase;caret-color:transparent">`;
  return`<div style="position:relative;width:58px;height:58px;border:${brd};border-radius:8px;background:${bg};box-sizing:border-box;overflow:hidden">
    ${inner}
    <span style="position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:9px;color:var(--color-text-tertiary);font-family:var(--font-mono);pointer-events:none">${coord}</span>
    ${drawIdx!==null&&inPath?`<span style="position:absolute;top:2px;right:4px;font-size:9px;font-weight:500;color:${wD.color};font-family:var(--font-mono)">${pos+1}</span>`:''}
    ${drawIdx===null&&owners.length>1?`<span style="position:absolute;top:2px;left:4px;font-size:9px;color:var(--color-text-secondary)">2+</span>`:''}
  </div>`;
}

function render(){
  const{meta,words,drawIdx,path,letters,newWord,showImport,importText,importErr,copied}=S;
  const own=buildOwn(words);
  const{errors,warnings,valid}=validate(meta,words,letters);
  const wD=drawIdx!==null?words[drawIdx]:null;
  const json=toJSON(meta,words,letters);
  document.getElementById('app').innerHTML=`
<div style="padding:0.5rem 0;font-size:13px;font-family:var(--font-sans)">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
  <div><div style="font-size:15px;font-weight:500;color:var(--color-text-primary)">GlitchSalad level editor</div>
  <div style="font-size:11px;color:var(--color-text-secondary)">Type letters into tiles · draw paths · export JSON</div></div>
  <button onclick="doReset()" style="font-size:11px">Reset</button>
</div>

<div style="display:grid;grid-template-columns:274px 1fr;gap:12px;margin-bottom:12px">
<div>
  <div style="background:var(--color-background-secondary);border-radius:12px;padding:14px;border:0.5px solid var(--color-border-tertiary)">
    <div style="display:grid;grid-template-columns:repeat(4,58px);gap:6px;margin-bottom:4px">
      ${COLS.map(c=>`<div style="text-align:center;font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono)">${c}</div>`).join('')}
    </div>
    ${ROWS.map(r=>`<div style="display:grid;grid-template-columns:repeat(4,58px);gap:6px;margin-bottom:6px">${COLS.map(c=>cell(c+r)).join('')}</div>`).join('')}
    <div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px;text-align:center">
      ${drawIdx===null?'Click a tile to type · Tab to advance · Backspace to clear':'Click tiles to draw path'}
    </div>
  </div>

  ${wD?`<div style="margin-top:8px;padding:10px 12px;background:var(--color-background-secondary);border:1.5px solid ${wD.color}44;border-radius:8px">
    <div style="font-size:11px;font-weight:500;color:${wD.color};margin-bottom:4px">Drawing: ${wD.display}</div>
    <div style="font-size:11px;font-family:var(--font-mono);color:var(--color-text-secondary);margin-bottom:8px">${path.join(' ')||'—'} (${path.length}/${wD.display.replace(/ /g,'').length})</div>
    <div style="display:flex;gap:6px">
      <button onclick="finishDraw()" style="font-size:11px;padding:4px 10px;background:${wD.color};color:#fff;border:none;border-radius:4px;cursor:pointer">Done</button>
      <button onclick="clearCP()" style="font-size:11px;padding:4px 10px">Clear</button>
      <button onclick="cancelDraw()" style="font-size:11px;padding:4px 10px;opacity:0.5">Cancel</button>
    </div>
  </div>`:''}

  ${drawIdx===null&&words.length?`<div style="margin-top:8px;padding-left:2px">
    ${words.map(w=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
      <div style="width:8px;height:8px;border-radius:2px;background:${w.color};flex-shrink:0"></div>
      <span style="font-size:11px;color:var(--color-text-secondary);font-family:var(--font-mono);flex:1">${w.display}</span>
      ${!w.path?'<span style="font-size:10px;color:var(--color-text-danger)">no path</span>':''}
    </div>`).join('')}
    <div style="font-size:10px;color:var(--color-text-tertiary);margin-top:2px">2+ = shared tile</div>
  </div>`:''}
</div>

<div style="background:var(--color-background-secondary);border-radius:12px;padding:12px 14px;border:0.5px solid var(--color-border-tertiary)">
  <div style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px">Metadata</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <div><div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em">ID</div>
    <input value="${meta.id}" oninput="upM('id',this.value.toLowerCase().replace(/[^a-z0-9]/g,''))" placeholder="videogameheroes" style="width:100%;font-family:var(--font-mono);font-size:12px"></div>

    <div><div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em">Category</div>
    <select onchange="upM('category',this.value)" style="width:100%;font-size:12px">${CATS.map(c=>`<option${c===meta.category?' selected':''}>${c}</option>`).join('')}</select></div>

    <div style="grid-column:1/-1"><div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em">Name (EN)</div>
    <input value="${meta.nameEn}" oninput="upM('nameEn',this.value)" placeholder="Video Game Heroes" style="width:100%"></div>

    <div style="grid-column:1/-1"><div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em">Name (ES)</div>
    <input value="${meta.nameEs}" oninput="upM('nameEs',this.value)" placeholder="Héroes de Videojuegos" style="width:100%"></div>

    <div><div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em">Difficulty</div>
    <select onchange="upM('difficulty',this.value)" style="width:100%;font-size:12px">${DIFFS.map(d=>`<option${d===meta.difficulty?' selected':''}>${d}</option>`).join('')}</select></div>

    <div><div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em">Date (optional)</div>
    <input value="${meta.date}" oninput="upM('date',this.value)" placeholder="YYYY-MM-DD" style="width:100%;font-family:var(--font-mono);font-size:12px"></div>

    <div style="grid-column:1/-1"><div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em">Hint (EN)</div>
    <input value="${meta.hintEn}" oninput="upM('hintEn',this.value)" placeholder="Optional flavor text..." style="width:100%"></div>

    <div style="grid-column:1/-1"><div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em">Hint (ES)</div>
    <input value="${meta.hintEs}" oninput="upM('hintEs',this.value)" placeholder="Texto opcional..." style="width:100%"></div>
  </div>
  <label style="display:flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--color-text-secondary);cursor:pointer">
    <input type="checkbox"${meta.premium?' checked':''} onchange="upM('premium',this.checked)"> Premium puzzle
  </label>
</div>
</div>

<div style="background:var(--color-background-secondary);border-radius:12px;padding:12px 14px;border:0.5px solid var(--color-border-tertiary);margin-bottom:12px">
  <div style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px">Words</div>
  <div style="display:flex;gap:6px;margin-bottom:10px">
    <input id="nw" value="${newWord}" oninput="S.newWord=this.value.toUpperCase();this.value=S.newWord"
      onkeydown="if(event.key==='Enter')addWord()"
      placeholder="SONIC or LARA CROFT" style="flex:1;font-family:var(--font-mono);font-size:12px">
    <button onclick="addWord()" style="padding:0 14px;font-size:12px">+ Add</button>
  </div>
  ${!words.length?`<div style="text-align:center;color:var(--color-text-tertiary);font-size:11px;padding:8px 0">No words yet</div>`:''}
  ${words.map((w,idx)=>`
  <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;margin-bottom:4px;border-radius:6px;background:${drawIdx===idx?w.color+'18':'transparent'};border:1px solid ${drawIdx===idx?w.color+'33':'transparent'}">
    <div style="width:8px;height:8px;border-radius:2px;background:${w.color};flex-shrink:0"></div>
    <span style="font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--color-text-primary);flex:1;min-width:0">${w.display}</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:${w.path?'var(--color-text-tertiary)':'var(--color-text-danger)'};max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${w.path||'no path'}</span>
    ${drawIdx!==idx?`<button onclick="startDraw(${idx})" style="font-size:10px;padding:2px 8px">Draw</button>`:`<span style="font-size:10px;color:${w.color};font-style:italic">drawing…</span>`}
    <button onclick="clearPath(${idx})" style="font-size:10px;padding:2px 6px;opacity:0.5" title="Clear path">✕</button>
    <button onclick="rmWord(${idx})" style="font-size:10px;padding:2px 6px;opacity:0.4"><i class="ti ti-trash" style="font-size:12px" aria-hidden="true"></i></button>
  </div>`).join('')}
</div>

<div style="padding:10px 14px;margin-bottom:12px;background:${valid?'var(--color-background-success)':'var(--color-background-danger)'};border:0.5px solid ${valid?'var(--color-border-success)':'var(--color-border-danger)'};border-radius:8px">
  <div style="font-size:12px;font-weight:500;color:${valid?'var(--color-text-success)':'var(--color-text-danger)'};margin-bottom:${errors.length+warnings.length?'6px':'0'}">
    ${valid?'✓ Valid':`✗ ${errors.length} error${errors.length!==1?'s':''}`}${warnings.length?` · ${warnings.length} warning${warnings.length!==1?'s':''}` :''}
  </div>
  ${errors.map(e=>`<div style="font-size:11px;color:var(--color-text-danger);margin-bottom:2px">✗ ${e}</div>`).join('')}
  ${warnings.map(w=>`<div style="font-size:11px;color:var(--color-text-warning);margin-bottom:2px">⚠ ${w}</div>`).join('')}
</div>

<div style="display:flex;gap:8px;align-items:flex-start">
  <textarea readonly style="flex:1;height:130px;font-family:var(--font-mono);font-size:11px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:8px;resize:vertical;box-sizing:border-box">${json.replace(/</g,'&lt;')}</textarea>
  <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
    <button onclick="doCopy()" style="padding:6px 14px;font-size:12px">${copied?'✓ Copied':'Copy JSON'}</button>
    <button onclick="S.showImport=!S.showImport;S.importErr='';render()" style="padding:6px 14px;font-size:12px">Import</button>
  </div>
</div>

${showImport?`<div style="margin-top:8px">
  <textarea id="imp" placeholder="Paste puzzle JSON here..." style="width:100%;height:100px;box-sizing:border-box;font-family:var(--font-mono);font-size:11px;background:var(--color-background-secondary);color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:8px;resize:vertical">${importText}</textarea>
  ${importErr?`<div style="font-size:11px;color:var(--color-text-danger);margin-top:4px">${importErr}</div>`:''}
  <div style="display:flex;gap:6px;margin-top:6px">
    <button onclick="doImport()" style="padding:5px 14px;font-size:12px">Import</button>
    <button onclick="S.showImport=false;S.importText='';S.importErr='';render()" style="padding:5px 14px;font-size:12px;opacity:0.6">Cancel</button>
  </div>
</div>`:''}

</div>`;
  if(pf&&S.drawIdx===null){const el=document.getElementById('t-'+pf);if(el){el.focus();el.select();}pf=null;}
}

window.tIn=(coord,el)=>{
  const raw=el.value;
  const letter=raw?raw[raw.length-1].toUpperCase():'';
  S.letters={...S.letters,[coord]:letter};
  if(letter){const i=CELL_ORDER.indexOf(coord);pf=i<CELL_ORDER.length-1?CELL_ORDER[i+1]:coord;}
  else pf=coord;
  render();
};

window.tKd=(coord,e)=>{
  if(e.key==='Backspace'&&!S.letters[coord]){
    const i=CELL_ORDER.indexOf(coord);
    if(i>0){const prev=CELL_ORDER[i-1];S.letters={...S.letters,[prev]:''};pf=prev;render();}
    e.preventDefault();
  }
  if(e.key==='Tab'){
    e.preventDefault();
    const i=CELL_ORDER.indexOf(coord);
    const next=e.shiftKey?CELL_ORDER[Math.max(0,i-1)]:CELL_ORDER[Math.min(CELL_ORDER.length-1,i+1)];
    pf=next;render();
  }
};

// --- Task 1: Letter auto-fill on path-draw ---
window.cellClick=(coord)=>{
  if(S.drawIdx===null)return;
  const w=S.words[S.drawIdx];
  const expectedLetters=w.display.replace(/ /g,'');
  const maxLen=expectedLetters.length;
  const ei=S.path.indexOf(coord);
  if(ei>=0){S.path=S.path.slice(0,ei+1);render();return;}
  if(S.path.length>=maxLen)return;
  if(S.path.length>0&&!isAdj(S.path[S.path.length-1],coord))return;
  const nextLetter=expectedLetters[S.path.length];
  if(nextLetter)S.letters={...S.letters,[coord]:nextLetter};
  S.path=[...S.path,coord];
  render();
};

window.upM=(k,v)=>{S.meta={...S.meta,[k]:v};render();};
window.addWord=()=>{const d=S.newWord.trim().toUpperCase();if(!d)return;S.words=[...S.words,{id:Math.random().toString(36).slice(2),display:d,path:'',color:WC[S.words.length%WC.length]}];S.newWord='';render();};
window.startDraw=(i)=>{S.path=S.words[i].path.match(/.{2}/g)||[];S.drawIdx=i;render();};
window.finishDraw=()=>{if(S.drawIdx===null)return;const u=[...S.words];u[S.drawIdx]={...u[S.drawIdx],path:S.path.join('')};S.words=u;S.drawIdx=null;S.path=[];render();};
window.cancelDraw=()=>{S.drawIdx=null;S.path=[];render();};
window.clearCP=()=>{S.path=[];render();};
window.clearPath=(i)=>{const u=[...S.words];u[i]={...u[i],path:''};S.words=u;if(S.drawIdx===i)S.path=[];render();};
window.rmWord=(i)=>{if(S.drawIdx===i){S.drawIdx=null;S.path=[];}else if(S.drawIdx>i)S.drawIdx--;S.words=S.words.filter((_,j)=>j!==i);render();};
window.doCopy=()=>{try{navigator.clipboard.writeText(toJSON(S.meta,S.words,S.letters));}catch(e){}S.copied=true;render();setTimeout(()=>{S.copied=false;render();},2000);};
window.doImport=()=>{
  const ta=document.getElementById('imp');
  if(ta)S.importText=ta.value;
  try{
    const r=JSON.parse(S.importText);
    S.meta={id:r.id||'',nameEn:r.name?.en||'',nameEs:r.name?.es||'',category:r.category||'characters',difficulty:r.difficulty||'medium',date:r.date||'',premium:r.premium||false,hintEn:r.hint?.en||'',hintEs:r.hint?.es||''};
    const letters={};
    Object.entries(r.data||{}).forEach(([d,p])=>{(p.match(/.{2}/g)||[]).forEach((c,i)=>{const L=d.replace(/ /g,'')[i];if(L)letters[c]=L;});});
    Object.entries(r.filler||{}).forEach(([c,l])=>{letters[c]=l;});
    S.letters=letters;
    S.words=Object.entries(r.data||{}).map(([d,p],i)=>({id:Math.random().toString(36).slice(2),display:d,path:p,color:WC[i%WC.length]}));
    S.showImport=false;S.importText='';S.importErr='';render();
  }catch(e){S.importErr='Invalid JSON: '+e.message;render();}
};
// --- Task 2: Reset confirmation ---
window.doReset=()=>{

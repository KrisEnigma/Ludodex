<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ludodex Skin Creator</title>
    <link rel="stylesheet" href="/src/fonts.css?v=2026-06-09" />
    <link rel="stylesheet" href="/src/skins/skins.css?v=2026-06-09" />
    <link rel="stylesheet" href="/src/index.css?v=2026-06-10" />
    <link rel="stylesheet" href="/src/skin-tester/tester.css?v=2026-06-09" />
    <link rel="stylesheet" href="/src/skin-creator/creator.css?v=2026-06-10f" />
  </head>
  <body>
    <div class="creator-layout">

      <!-- Top bar -->
      <header class="creator-topbar">
        <span class="creator-topbar-logo">Skin Creator</span>
        <div class="creator-topbar-controls">
          <label class="creator-label" for="creatorPresetSelect">Load preset</label>
          <select id="creatorPresetSelect" class="creator-select"></select>
        </div>
        <div class="creator-topbar-actions">
          <button id="creatorResetDefaults" class="creator-btn creator-btn-ghost" type="button">Reset</button>
          <button id="creatorExport" class="creator-btn creator-btn-primary" type="button">Export CSS</button>
        </div>
      </header>

      <!-- Two-panel body -->
      <div class="creator-body">

        <!-- Left: editor panel -->
        <aside class="creator-editor" id="creatorEditor">
          <div class="creator-editor-inner" id="creatorEditorInner">
            <!-- Fully populated by creator.js, including the Custom CSS section -->
          </div>
        </aside>

        <!-- Right: preview panel -->
        <main class="creator-preview-panel">
          <!-- Screen tabs -->
          <nav class="creator-screen-tabs" id="creatorScreenTabs" aria-label="Preview screen"></nav>

          <!-- Preview stage -->
          <div class="creator-stage-wrap">
            <div class="creator-stage" id="creatorStage">
              <div class="creator-preview" id="creatorPreview">
                <!-- Populated by creator.js -->
              </div>
            </div>
          </div>
        </main>

      </div>
    </div>

    <!-- Export modal -->
    <div class="creator-modal-backdrop" id="exportModal" hidden>
      <div class="creator-modal" role="dialog" aria-modal="true" aria-labelledby="exportModalTitle">
        <div class="creator-modal-head">
          <h2 class="creator-modal-title" id="exportModalTitle">Export skin</h2>
          <button class="creator-modal-close" id="exportModalClose" type="button" aria-label="Close">✕</button>
        </div>

        <div class="creator-modal-body">

          <div class="creator-modal-section">
            <div class="creator-modal-hint">
              <span><strong>1 — CSS</strong> &nbsp;<code>src/skins/skins.css</code></span>
              <button id="exportCopy" class="creator-btn creator-btn-primary" type="button">Copy</button>
            </div>
            <textarea id="exportOutput" class="creator-textarea creator-export-textarea" readonly></textarea>
          </div>

          <div class="creator-modal-section">
            <div class="creator-modal-hint">
              <span><strong>2 — SkinId union</strong> &nbsp;<code>src/skins/registry.ts</code></span>
              <button id="exportCopyRegistryId" class="creator-btn creator-btn-primary" type="button">Copy</button>
            </div>
            <textarea id="exportRegistryId" class="creator-textarea creator-export-textarea" readonly></textarea>
          </div>

          <div class="creator-modal-section creator-unlock-section" id="exportUnlockSection">
            <div class="creator-modal-hint">
              <span><strong>Unlock type</strong> — controls the registry entry below</span>
            </div>
            <div class="creator-unlock-body">
              <label class="creator-unlock-check-label">
                <input type="checkbox" id="exportIsPaid">
                <span>Paid IAP</span>
                <span class="creator-unlock-typehint">productId: 'skin_{slug}'</span>
              </label>
              <label class="creator-unlock-check-label">
                <input type="checkbox" id="exportHasBundle">
                <span>Bundle</span>
                <span class="creator-unlock-typehint">bundleProductId: 'skin_bundle'</span>
              </label>
              <label class="creator-unlock-check-label">
                <input type="checkbox" id="exportHasAchievement">
                <span>Achievement unlock</span>
                <span class="creator-unlock-typehint">unlockedByAchievement + unlockHint (TODO placeholders)</span>
              </label>
            </div>
          </div>

          <div class="creator-modal-section">
            <div class="creator-modal-hint">
              <span><strong>3 — SKINS array entry</strong> &nbsp;<code>src/skins/registry.ts</code></span>
              <button id="exportCopyRegistryArray" class="creator-btn creator-btn-primary" type="button">Copy</button>
            </div>
            <textarea id="exportRegistryArray" class="creator-textarea creator-export-textarea" readonly></textarea>
          </div>

          <div class="creator-modal-section" id="exportSectionFonts">
            <div class="creator-modal-hint">
              <span><strong>4 — Font setup</strong> &nbsp;<code>src/fonts.css</code> — only if your skin uses a new font.</span>
              <button id="exportCopyFonts" class="creator-btn creator-btn-primary" type="button">Copy</button>
            </div>
            <textarea id="exportFonts" class="creator-textarea creator-export-textarea" readonly></textarea>
          </div>

          <div class="creator-modal-actions creator-modal-footer">
            <button id="exportClose2" class="creator-btn creator-btn-ghost" type="button">Close</button>
          </div>

        </div>
      </div>
    </div>

    <script src="/src/skin-creator/creator.js?v=2026-06-10f"></script>
  </body>
</html>

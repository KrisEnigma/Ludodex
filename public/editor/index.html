<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>Ludodex Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/editor/editor.css">
</head>
<body>

<!-- TOP BAR -->
<header id="topbar">
  <div id="topbar-logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <rect x="3" y="3" width="7" height="7" rx="1.5"/>
      <rect x="14" y="3" width="7" height="7" rx="1.5"/>
      <rect x="3" y="14" width="7" height="7" rx="1.5"/>
      <rect x="14" y="14" width="7" height="7" rx="1.5"/>
    </svg>
    Ludodex
  </div>
  <div class="topbar-sep"></div>
  <div id="login-group" style="display:flex;align-items:center;gap:8px;">
    <input id="api-token" type="password" placeholder="Bearer token…" autocomplete="current-password" aria-label="API bearer token">
    <button class="btn btn-load" onclick="serverLoad()" title="Load all puzzles">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Load
    </button>
  </div>
  <div id="logged-group" style="display:none;align-items:center;gap:8px;flex-wrap:wrap;">
    <select id="puzzle-select" aria-label="Select puzzle" onchange="serverSelectPuzzle(this.value)">
      <option value="">— select puzzle —</option>
    </select>
    <button class="btn btn-ghost" onclick="serverNew()" id="btn-new" title="New puzzle">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New
    </button>
    <button class="btn btn-success" onclick="serverSaveCurrent()" id="btn-save" title="Save puzzle">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save
    </button>
    <button class="btn btn-danger" onclick="serverDeleteCurrent()" id="btn-delete" title="Delete puzzle">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      Delete
    </button>
    <button class="btn btn-ghost btn-icon" onclick="serverLogout()" title="Log out" aria-label="Log out">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
    <div class="topbar-sep"></div>
    <div class="mode-toggle-group" role="group" aria-label="Editor mode">
      <button class="btn mode-toggle-btn is-active" id="mode-btn-full" onclick="setEditorMode('full')" title="Full editor">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Editor
      </button>
      <button class="btn mode-toggle-btn" id="mode-btn-list" onclick="setEditorMode('list')" title="List / metadata view">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        List
      </button>
    </div>
  </div>
  <div class="topbar-spacer"></div>
  <span id="server-status"></span>
  <button class="btn btn-icon btn-ghost" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme" data-theme-toggle>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</header>

<!-- WORKSPACE -->
<main id="workspace">
  <div class="editor-header">
    <div class="editor-title">
      <h1>Level editor</h1>
      <span id="dirty-chip" class="save-chip save-chip--clean">Saved</span>
    </div>
    <div class="editor-actions">
      <button class="btn btn-ghost" onclick="doReset()" title="Reset to blank">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Reset
      </button>
    </div>
  </div>

  <!-- Mobile section tabs -->
  <div class="mobile-tabs" role="tablist" aria-label="Editor sections">
    <button class="mobile-tab is-active" role="tab" onclick="setTab('edit')" data-tab="edit">Grid &amp; Words</button>
    <button class="mobile-tab" role="tab" onclick="setTab('meta')" data-tab="meta">Details</button>
    <button class="mobile-tab" role="tab" onclick="setTab('export')" data-tab="export">Export</button>
  </div>

  <div class="layout-grid">
    <!-- LEFT: Grid + Words -->
    <section class="left-column mobile-pane is-active" data-panel="edit" aria-label="Tile grid and words">

      <!-- Tile grid card -->
      <div class="card" style="margin-bottom: var(--space-4);">
        <div class="card-header">
          <span class="card-title">Tile Grid</span>
          <span class="card-meta" id="grid-fill-label">0/16 filled</span>
        </div>
        <div class="tile-grid-wrap" id="grid-wrap">
          <!-- Rendered by JS -->
        </div>
      </div>

      <!-- Draw context -->
      <div class="draw-context card" id="draw-context" style="margin-bottom: var(--space-4);">
        <!-- Rendered by JS -->
      </div>

      <!-- Words card -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Words</span>
          <span class="card-meta" id="word-count-label">0 total</span>
        </div>
        <div class="card-body">
          <div class="words-add-row">
            <input class="words-add-input" id="nw" type="text" placeholder="SONIC or LARA CROFT"
              oninput="S.newWord=this.value.toUpperCase();this.value=S.newWord"
              onkeydown="if(event.key==='Enter')addWord()"
              autocomplete="off" spellcheck="false" autocapitalize="characters"
              aria-label="New word">
            <button class="btn btn-primary" onclick="addWord()">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add
            </button>
          </div>
          <div class="words-list" id="words-list">
            <!-- Rendered by JS -->
          </div>
        </div>
      </div>
    </section>

    <!-- RIGHT: Meta + Export -->
    <div class="right-column">

      <!-- Meta card -->
      <div class="card mobile-pane" data-panel="meta" style="margin-bottom: var(--space-4);">
        <div class="card-header">
          <span class="card-title">Puzzle Details</span>
        </div>
        <div class="card-body">
          <div class="form-grid" id="meta-form">
            <!-- Rendered by JS -->
          </div>
        </div>
      </div>

      <!-- Validation + Export card -->
      <div class="card mobile-pane" data-panel="export">
        <div class="card-header">
          <span class="card-title">Validate &amp; Export</span>
        </div>
        <div class="card-body">
          <div id="validation-block"></div>
          <div class="json-output-wrap">
            <pre class="json-output" id="json-output" aria-label="JSON output"></pre>
            <div class="copy-btn-wrap">
              <button class="btn btn-ghost" id="copy-btn" onclick="copyJSON()" style="font-size:11px; padding: 5px 12px; min-height: 30px;">
                Copy
              </button>
            </div>
          </div>
          <div class="divider"></div>
          <div style="font-size: var(--text-xs); font-weight: 700; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--space-3);">Import JSON</div>
          <div class="import-area">
            <textarea class="import-textarea" id="import-text" placeholder='Paste puzzle JSON here…' oninput="S.importText=this.value"></textarea>
            <div id="import-error" class="import-error"></div>
            <div style="margin-top: var(--space-3); display: flex; gap: var(--space-2);">
              <button class="btn btn-ghost" onclick="doImport()">Import</button>
              <button class="btn btn-ghost" onclick="S.importText='';S.importErr='';document.getElementById('import-text').value='';renderExport()">Clear</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<!-- List mode panel -->
<div id="list-panel" style="display:none;" aria-label="Puzzle list editor">
  <div class="list-panel-inner">
    <div class="list-toolbar">
      <span class="list-count" id="list-count"></span>
      <button class="btn btn-ghost" onclick="listReload()" title="Refresh from server">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Refresh
      </button>
    </div>
    <div id="list-items" class="list-items"></div>
  </div>
</div>

<!-- Dialog mount -->
<div id="dialog-mount"></div>
  <script src="/editor/editor.js" defer></script>
</body>
</html>

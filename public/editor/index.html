<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Ludodex Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400..800;1,400..600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./editor/editor.css">
</head>
<body>

<!-- ============ TOPBAR ============ -->
<header id="topbar">
  <div class="brand">
    <span class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
        <rect x="3.5" y="3.5" width="7" height="7" rx="2"/><rect x="13.5" y="3.5" width="7" height="7" rx="2"/>
        <rect x="3.5" y="13.5" width="7" height="7" rx="2"/><rect x="13.5" y="13.5" width="7" height="7" rx="2"/>
      </svg>
    </span>
    Ludodex<small>Editor</small>
  </div>

  <div class="bar-spacer"></div>

  <!-- logged-out: token -->
  <div class="bar-group" id="login-group">
    <input id="api-token" class="field token-field mono" type="password" placeholder="Bearer token…" autocomplete="current-password" aria-label="API bearer token">
    <button class="btn btn-primary" onclick="serverLoad()" title="Connect & load levels">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9z"/></svg>
      Connect
    </button>
  </div>

  <!-- logged-in -->
  <div class="bar-group hidden" id="logged-group">
    <span class="status-pill" id="server-status"><span class="dot"></span><span id="server-status-text">Not connected</span></span>
    <button class="btn btn-ghost btn-icon" id="btn-logout" onclick="serverLogout()" title="Disconnect" aria-label="Disconnect">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</header>

<!-- ============ LIBRARY (home) ============ -->
<div id="library-view">
  <div class="list-toolbar">
    <h1>Levels</h1>
    <span class="count-pill" id="list-count">0</span>
    <div class="spacer"></div>
    <div class="list-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="field" id="list-search-input" type="text" placeholder="Search levels…" oninput="listFilter(this.value)" aria-label="Search levels">
    </div>
    <button class="btn btn-primary" onclick="newLevel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New level
    </button>
    <button class="btn btn-ghost btn-icon" onclick="openImport()" title="Import JSON" aria-label="Import JSON">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button class="btn btn-success hidden" id="btn-save-order" onclick="saveOrder()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
      Save order
    </button>
    <button class="btn btn-ghost btn-icon" onclick="listReload()" title="Refresh" aria-label="Refresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
  </div>
  <div id="list-items" class="list-items"></div>
</div>

<!-- ============ GRID EDITOR ============ -->
<div id="grid-view" class="hidden">
  <div class="ge-head">
    <button class="btn btn-ghost" onclick="closeGridEditor()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      <span class="ge-back-label">Levels</span>
    </button>
    <div class="ge-title">
      <span class="ge-name" id="ge-name">Untitled</span>
      <span class="ge-id mono" id="ge-id"></span>
    </div>
    <span class="save-chip save-chip--clean" id="ge-validation"><span class="dot"></span>Ready</span>
    <div class="ge-actions">
      <button class="btn btn-ghost btn-icon ge-copy" onclick="copyGridJSON()" title="Copy JSON" aria-label="Copy JSON">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
      <button class="btn btn-success" onclick="saveGrid()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save
      </button>
    </div>
  </div>

  <div class="ge-layout">
    <!-- grid -->
    <div class="card">
      <div class="card-head">
        <div class="title">
          <span class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          </span>
          <span class="card-title">Tile grid</span>
        </div>
        <span class="count-pill" id="grid-fill-label">0/16</span>
      </div>
      <div class="draw-banner" id="draw-banner"></div>
      <div class="grid-stage">
        <div class="grid-hint" id="grid-hint"></div>
        <div class="tile-grid" id="tile-grid"></div>
        <div class="grid-legend" id="grid-legend"></div>
      </div>
    </div>

    <!-- words -->
    <div class="card">
      <div class="card-head">
        <div class="title">
          <span class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v2"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="9" y1="20" x2="15" y2="20"/></svg>
          </span>
          <span class="card-title">Words &amp; paths</span>
        </div>
        <span class="count-pill" id="word-count-label">0 words</span>
      </div>
      <div class="card-body">
        <div class="words-add">
          <input class="field" id="nw" type="text" placeholder="SONIC or LARA CROFT"
            oninput="S.newWord=this.value.toUpperCase();this.value=S.newWord"
            onkeydown="if(event.key==='Enter')addWord()"
            autocomplete="off" spellcheck="false" autocapitalize="characters" aria-label="New word">
          <button class="btn btn-primary" onclick="addWord()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add
          </button>
        </div>
        <div class="words-list" id="words-list"></div>
      </div>
    </div>
  </div>
</div>

<div id="dialog-mount"></div>
<div id="toast-mount"></div>

<script src="./editor/editor.js" defer></script>
</body>
</html>

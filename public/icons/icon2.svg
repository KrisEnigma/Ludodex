<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- bg-edge -->
  <rect width="1024" height="1024" fill="#0a0414" />
  
  <!-- Intense Cyberpunk Glow -->
  <circle cx="512" cy="512" r="380" fill="#ff2bd6" opacity="0.14" filter="blur(50px)" />

  <!-- D-PAD SKELETON CONNECTIONS -->
  <g stroke="#150620" stroke-width="56" stroke-linecap="round" stroke-linejoin="round">
    <line x1="512" y1="212" x2="512" y2="812" />
    <line x1="212" y1="512" x2="812" y2="512" />
  </g>

  <!-- THE D-PAD NODES -->
  <g fill="#150620" stroke="#4a1f6a" stroke-width="14" stroke-linejoin="round">
    <rect x="422" y="422" width="180" height="180" rx="36" />
    <rect x="422" y="122" width="180" height="180" rx="36" />
    <rect x="722" y="422" width="180" height="180" rx="36" />
    <rect x="422" y="722" width="180" height="180" rx="36" />
    <rect x="122" y="422" width="180" height="180" rx="36" />
  </g>

  <!-- THE ACTIVE SWIPE PATH -->
  <path d="M 212 512 L 512 512 L 512 212" 
        fill="none" stroke="#ff2bd6" stroke-width="56" stroke-linecap="round" stroke-linejoin="round" 
        filter="drop-shadow(0px 0px 24px rgba(255, 43, 214, 0.9))" />
        
  <!-- Oversized Neon Endpoints -->
  <circle cx="212" cy="512" r="36" fill="#ffffff" filter="drop-shadow(0px 0px 12px #ff7af0)" />
  <circle cx="512" cy="512" r="24" fill="#ff2bd6" />
  <circle cx="512" cy="212" r="36" fill="#ffffff" filter="drop-shadow(0px 0px 12px #ff7af0)" />
</svg>
